name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 0.1.3 or v0.1.3-rc.1"
        required: true
        type: string
      create_release:
        description: "Create a GitHub Release after publish"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare release metadata
    runs-on: ubuntu-latest
    outputs:
      ref_name: ${{ steps.prepare.outputs.ref_name }}
      version: ${{ steps.prepare.outputs.version }}
      create_release: ${{ steps.prepare.outputs.create_release }}

    steps:
      - name: Determine release metadata
        id: prepare
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "push") {
            $refName = "${{ github.ref_name }}"
            if (-not $refName) {
              throw "Tag push workflow requires github.ref_name."
            }

            $version = $refName.TrimStart('v')
            $createRelease = "true"
          } else {
            $rawVersion = "${{ inputs.version }}"
            if (-not $rawVersion) {
              throw "workflow_dispatch requires a version input."
            }

            $version = $rawVersion.TrimStart('v')
            $refName = if ($rawVersion.StartsWith('v')) {
              $rawVersion
            } else {
              "v$rawVersion"
            }
            $createRelease = "${{ inputs.create_release }}".ToLowerInvariant()
          }

          "ref_name=$refName" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT
          "create_release=$createRelease" >> $env:GITHUB_OUTPUT

  publish:
    needs: prepare
    name: Publish ${{ matrix.rid }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        rid:
          - win-x64
          - win-arm64

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        shell: pwsh
        run: |
          $version = "${{ needs.prepare.outputs.version }}"
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Publish application
        shell: pwsh
        env:
          SPARKLE_PUBLIC_KEY: ${{ secrets.SPARKLE_PUBLIC_KEY }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:SPARKLE_PUBLIC_KEY)) {
            throw "SPARKLE_PUBLIC_KEY repository secret is required: a build without the embedded key cannot verify update signatures."
          }

          $version = "${{ steps.version.outputs.version }}"
          $publishDirectory = Join-Path $env:RUNNER_TEMP "publish-${{ matrix.rid }}"

          dotnet publish source/Resonalyze.csproj `
            --configuration Release `
            --runtime "${{ matrix.rid }}" `
            --self-contained true `
            --output $publishDirectory `
            -p:Version=$version `
            -p:InformationalVersion=$version `
            -p:SparklePublicKey="$env:SPARKLE_PUBLIC_KEY" `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:DebugType=None `
            -p:DebugSymbols=false

          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

          Get-ChildItem $publishDirectory -Filter *.pdb | Remove-Item

          $archive = "Resonalyze-${{ needs.prepare.outputs.ref_name }}-${{ matrix.rid }}.zip"
          Compress-Archive -Path "$publishDirectory\*" -DestinationPath $archive

          $hash = (Get-FileHash $archive -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $archive" | Set-Content "$archive.sha256" -Encoding ascii

      - name: Upload release files
        uses: actions/upload-artifact@v7
        with:
          name: Resonalyze-${{ matrix.rid }}
          path: |
            Resonalyze-${{ needs.prepare.outputs.ref_name }}-${{ matrix.rid }}.zip
            Resonalyze-${{ needs.prepare.outputs.ref_name }}-${{ matrix.rid }}.zip.sha256
          if-no-files-found: error

  setup:
    needs: prepare
    name: Build Windows installer
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Publish win-x64 application
        shell: pwsh
        env:
          SPARKLE_PUBLIC_KEY: ${{ secrets.SPARKLE_PUBLIC_KEY }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:SPARKLE_PUBLIC_KEY)) {
            throw "SPARKLE_PUBLIC_KEY repository secret is required: a build without the embedded key cannot verify update signatures."
          }

          $version = "${{ needs.prepare.outputs.version }}"
          $publishDirectory = Join-Path $env:RUNNER_TEMP "publish-win-x64"

          dotnet publish source/Resonalyze.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            --output $publishDirectory `
            -p:Version=$version `
            -p:InformationalVersion=$version `
            -p:SparklePublicKey="$env:SPARKLE_PUBLIC_KEY" `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:DebugType=None `
            -p:DebugSymbols=false

          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

          Get-ChildItem $publishDirectory -Filter *.pdb | Remove-Item
          "publish_directory=$publishDirectory" >> $env:GITHUB_OUTPUT
        id: publish

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Install NetSparkle appcast generator
        shell: pwsh
        run: dotnet tool install --global NetSparkleUpdater.Tools.AppCastGenerator

      - name: Build Setup.exe
        shell: pwsh
        run: |
          $outputDirectory = Join-Path $env:RUNNER_TEMP "setup"
          New-Item -ItemType Directory -Force -Path $outputDirectory | Out-Null

          $setupBaseName = "Resonalyze-Setup-${{ needs.prepare.outputs.ref_name }}-win-x64"
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" `
            installer\Resonalyze.iss `
            "/DAppVersion=${{ needs.prepare.outputs.version }}" `
            "/DSourceDir=${{ steps.publish.outputs.publish_directory }}" `
            "/DOutputDir=$outputDirectory" `
            "/DOutputBaseFilename=$setupBaseName"

          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

          $setupPath = Join-Path $outputDirectory "$setupBaseName.exe"
          Copy-Item $setupPath ".\$setupBaseName.exe"
          $hash = (Get-FileHash ".\$setupBaseName.exe" -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $setupBaseName.exe" | Set-Content ".\$setupBaseName.exe.sha256" -Encoding ascii

      - name: Generate NetSparkle appcast
        shell: pwsh
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
          SPARKLE_PUBLIC_KEY: ${{ secrets.SPARKLE_PUBLIC_KEY }}
        run: |
          $refName = "${{ needs.prepare.outputs.ref_name }}"
          $setupFile = "Resonalyze-Setup-$refName-win-x64.exe"
          $appcastDirectory = Join-Path $env:RUNNER_TEMP "appcast"
          $binaryDirectory = Join-Path $env:RUNNER_TEMP "appcast-binaries"
          New-Item -ItemType Directory -Force -Path $appcastDirectory | Out-Null
          New-Item -ItemType Directory -Force -Path $binaryDirectory | Out-Null
          Copy-Item $setupFile $binaryDirectory

          if ([string]::IsNullOrWhiteSpace($env:SPARKLE_PRIVATE_KEY) -or
              [string]::IsNullOrWhiteSpace($env:SPARKLE_PUBLIC_KEY)) {
            throw "SPARKLE_PRIVATE_KEY and SPARKLE_PUBLIC_KEY repository secrets are required for signed updates."
          }

          netsparkle-generate-appcast `
            --appcast-output-directory $appcastDirectory `
            --ext exe `
            --binaries $binaryDirectory `
            --file-version "${{ needs.prepare.outputs.version }}" `
            --product-name "Resonalyze" `
            --os "windows-x64" `
            --base-url "https://github.com/${{ github.repository }}/releases/download/$refName" `
            --link-tag "https://github.com/${{ github.repository }}/releases/latest/download/appcast.xml" `
            --description-tag "Most recent Resonalyze release." `
            --human-readable true `
            --private-key-override "$env:SPARKLE_PRIVATE_KEY" `
            --public-key-override "$env:SPARKLE_PUBLIC_KEY"

          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

          Copy-Item (Join-Path $appcastDirectory "appcast.xml") ".\appcast.xml"
          Copy-Item (Join-Path $appcastDirectory "appcast.xml.signature") ".\appcast.xml.signature"

      - name: Upload setup files
        uses: actions/upload-artifact@v7
        with:
          name: Resonalyze-Setup-win-x64
          path: |
            Resonalyze-Setup-${{ needs.prepare.outputs.ref_name }}-win-x64.exe
            Resonalyze-Setup-${{ needs.prepare.outputs.ref_name }}-win-x64.exe.sha256
            appcast.xml
            appcast.xml.signature
          if-no-files-found: error

  release:
    if: ${{ needs.prepare.outputs.create_release == 'true' }}
    name: Create GitHub Release
    needs:
      - prepare
      - publish
      - setup
    runs-on: ubuntu-latest

    steps:
      - name: Download release files
        uses: actions/download-artifact@v8
        with:
          path: release
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ needs.prepare.outputs.ref_name }}" release/* \
            --repo "${{ github.repository }}" \
            --title "Resonalyze ${{ needs.prepare.outputs.ref_name }}" \
            --generate-notes \
            --verify-tag
